<!--
═══════════════════════════════════════════════════════════════════════════
  PARTIAL: BreadcrumbList Schema
  Add to <head> of every interior page (NOT homepage).
  REPLACE the placeholders before pasting:
    {{CURRENT_PAGE_URL}}     full URL of this page
    {{CURRENT_PAGE_TITLE}}   short title shown in breadcrumb
    {{CATEGORY_NAME}}        e.g. "Services" / "Locations" / "Products"
    {{CATEGORY_URL}}         e.g. https://www.omnetit.in/services.html

  Example for /it-support-noida.html:
    Home  ›  Locations  ›  IT Support Noida
═══════════════════════════════════════════════════════════════════════════
-->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://www.omnetit.in/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{CATEGORY_NAME}}",
      "item": "{{CATEGORY_URL}}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{CURRENT_PAGE_TITLE}}",
      "item": "{{CURRENT_PAGE_URL}}"
    }
  ]
}
</script>
