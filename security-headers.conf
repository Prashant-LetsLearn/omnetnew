# ════════════════════════════════════════════════════════════════════════
# OPTION 4 — CLOUDFLARE TRANSFORM RULES (UI-driven)
# ════════════════════════════════════════════════════════════════════════
# In Cloudflare dashboard: Rules → Transform Rules → HTTP Response Header
# Modification → Create rule. Add each header below as a separate "Set
# static" entry, and apply to all requests for omnetit.in.
#
#   Header name                      Value
#   -----------                      -----
#   Strict-Transport-Security        max-age=63072000; includeSubDomains; preload
#   X-Frame-Options                  SAMEORIGIN
#   X-Content-Type-Options           nosniff
#   Referrer-Policy                  strict-origin-when-cross-origin
#   Permissions-Policy               camera=(), microphone=(), geolocation=(self), payment=(self)
#   Content-Security-Policy          (paste the long line from option 3)
#
# Also enable Cloudflare → SSL/TLS → Edge Certificates → "Always Use HTTPS"
# and "HTTP Strict Transport Security (HSTS)" with max-age 12 months.


# ════════════════════════════════════════════════════════════════════════
# META-TAG FALLBACK (paste in <head> of every page if no server access)
# ════════════════════════════════════════════════════════════════════════
# Note: HSTS, X-Frame-Options and Set-Cookie CANNOT be set via meta tag —
# they MUST come from the response header. Everything else can:
#
# <meta http-equiv="Content-Security-Policy"
#       content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://www.gstatic.com https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; connect-src 'self' https://api.web3forms.com https://www.google-analytics.com https://api.razorpay.com; frame-src 'self' https://www.google.com https://www.youtube.com https://api.razorpay.com; object-src 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com; upgrade-insecure-requests;">
# <meta http-equiv="X-Content-Type-Options" content="nosniff">
# <meta name="referrer" content="strict-origin-when-cross-origin">
