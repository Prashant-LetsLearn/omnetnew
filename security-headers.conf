# ════════════════════════════════════════════════════════════════════════
# OMNET IT — SECURITY HEADERS
# ════════════════════════════════════════════════════════════════════════
# Configurations are provided for FOUR common deployment targets so you
# can pick whichever matches where omnetit.in actually lives.
#
# IMPORTANT: omnetit.in is currently served from GitHub Pages (a CNAME file
# is present in the repo). GitHub Pages does NOT let you set custom HTTP
# headers. To get real header-level security on a Pages deployment you have
# three options, listed in order of effort:
#
#   A) Put Cloudflare in front (free plan is enough). Use Cloudflare
#      "Transform Rules → Modify Response Header" or the new
#      "HTTP Response Header Modification" rules to add the headers below.
#      Use Cloudflare HSTS settings for HSTS.
#   B) Migrate the site to Cloudflare Pages or Netlify. Both honour a
#      `_headers` file at the repo root — see the Netlify/Cloudflare Pages
#      block at the bottom of this file.
#   C) Move to Nginx/Apache hosting (your own server / a VPS) and use the
#      blocks below directly.
#
# The CSP allowlist below is calibrated for the current site's third-party
# usage:
#   • api.web3forms.com           — form submissions
#   • www.googletagmanager.com    — Google Analytics gtag
#   • www.google-analytics.com    — GA pixel
#   • www.google.com              — reCAPTCHA v3
#   • www.gstatic.com             — reCAPTCHA + Google fonts assets
#   • cdnjs.cloudflare.com        — Remixicon CSS
#   • fonts.googleapis.com        — Google Fonts
#   • fonts.gstatic.com           — Google Fonts files
#   • checkout.razorpay.com       — payment widget on shop.html (if used)
#   • api.razorpay.com            — payment API
#
# If you ADD a new third-party script/stylesheet/image origin, you MUST add
# it to the relevant CSP directive below or the browser will block it.
# ════════════════════════════════════════════════════════════════════════


# ════════════════════════════════════════════════════════════════════════
# OPTION 1 — NGINX (drop into your server { ... } block)
# ════════════════════════════════════════════════════════════════════════
# Force HTTPS at the connection level
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Stop the page being framed by anyone except us (clickjacking defence)
add_header X-Frame-Options "SAMEORIGIN" always;

# Stop browsers MIME-sniffing responses (e.g. treating .txt as JS)
add_header X-Content-Type-Options "nosniff" always;

# Legacy XSS auditor (modern browsers ignore but some firewalls check)
add_header X-XSS-Protection "1; mode=block" always;

# Don't leak the full referring URL to other sites
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Block dangerous browser features by default
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self), usb=(), interest-cohort=()" always;

# Cross-origin isolation (safe defaults)
add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
add_header Cross-Origin-Resource-Policy "same-origin"              always;

# Content Security Policy — the big one
add_header Content-Security-Policy "default-src 'self'; \
  script-src  'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://www.gstatic.com https://checkout.razorpay.com; \
  style-src   'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; \
  img-src     'self' data: https: blob:; \
  font-src    'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; \
  connect-src 'self' https://api.web3forms.com https://www.google-analytics.com https://api.razorpay.com; \
  frame-src   'self' https://www.google.com https://www.youtube.com https://www.youtube-nocookie.com https://api.razorpay.com; \
  object-src  'none'; \
  base-uri    'self'; \
  form-action 'self' https://api.web3forms.com; \
  frame-ancestors 'self'; \
  upgrade-insecure-requests;" always;


# ════════════════════════════════════════════════════════════════════════
# OPTION 2 — APACHE (.htaccess at site root)
# ════════════════════════════════════════════════════════════════════════
# <IfModule mod_headers.c>
#   Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
#   Header always set X-Frame-Options            "SAMEORIGIN"
#   Header always set X-Content-Type-Options     "nosniff"
#   Header always set X-XSS-Protection           "1; mode=block"
#   Header always set Referrer-Policy            "strict-origin-when-cross-origin"
#   Header always set Permissions-Policy         "camera=(), microphone=(), geolocation=(self), payment=(self), usb=(), interest-cohort=()"
#   Header always set Cross-Origin-Opener-Policy "same-origin-allow-popups"
#   Header always set Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://www.gstatic.com https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; connect-src 'self' https://api.web3forms.com https://www.google-analytics.com https://api.razorpay.com; frame-src 'self' https://www.google.com https://www.youtube.com https://api.razorpay.com; object-src 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com; frame-ancestors 'self'; upgrade-insecure-requests;"
# </IfModule>
#
# # Force HTTPS
# RewriteEngine On
# RewriteCond %{HTTPS} off
# RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]


